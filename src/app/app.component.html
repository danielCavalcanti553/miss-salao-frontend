<ion-app>

  <ion-menu contentId="main-content" side="start">

    <ng-container *ngIf="(auth.user$ | async) as user">

      <!-- HEADER -->
      <ion-header>
        <ion-toolbar style="--background: #FEFAF8;">
          <div style="text-align: center;">
            <img src="assets/logo-miss.png" style="margin-bottom: 10px;">
          </div>
        </ion-toolbar>
      </ion-header>

      <!-- CONTEÚDO -->
      <ion-content class="menu-content">

        <ion-list>

          <ion-menu-toggle auto-hide="false">
            <ion-item routerLink="/home">
              <ion-icon name="home-outline" slot="start"></ion-icon>
              <ion-label>Início</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle auto-hide="false">
            <ion-item routerLink="/home">
              <ion-icon name="calendar-outline" slot="start"></ion-icon>
              <ion-label>Meus Agendamentos</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle auto-hide="false">
            <ion-item routerLink="/perfil">
              <ion-icon name="person-outline" slot="start"></ion-icon>
              <ion-label>Perfil</ion-label>
            </ion-item>
          </ion-menu-toggle>

        </ion-list>

      </ion-content>

      <!-- FOOTER FIXO -->
      <ion-footer>
        <ion-toolbar>
          <ion-item button (click)="logoff()">
            <ion-icon name="log-out-outline" slot="start"></ion-icon>
            <ion-label>Sair</ion-label>
          </ion-item>
        </ion-toolbar>
      </ion-footer>

    </ng-container>

  </ion-menu>

  <!-- CONTEÚDO PRINCIPAL -->
  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
